services:
  - type: web
    name: gym-tracker-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"
    disk:
      name: gym-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
